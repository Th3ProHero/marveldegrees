services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: marvel
      POSTGRES_PASSWORD: marvel
      POSTGRES_DB: degrees_of_marvel
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marvel -d degrees_of_marvel"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8084:3000"
    environment:
      - DATABASE_URL=postgresql://marvel:marvel@db:5432/degrees_of_marvel?schema=public
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_ACCESS_TOKEN=${TMDB_ACCESS_TOKEN}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./prisma:/app/prisma
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
